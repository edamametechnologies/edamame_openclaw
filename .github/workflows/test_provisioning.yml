on:
  push:
    branches: [ dev, main ]
    paths:
      - 'setup/**'
      - 'extensions/**'
      - 'skill/**'
      - 'tests/**'
      - '.github/workflows/test_provisioning.yml'
  pull_request:
    paths:
      - 'setup/**'
      - 'extensions/**'
      - 'skill/**'
      - 'tests/**'
      - '.github/workflows/test_provisioning.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

name: Provisioning lifecycle tests

permissions: read-all

jobs:
  provision:
    name: Provision (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Install edamame_posture (real MCP server) ───────────────
      # PSK pairing mode: install posture CLI, generate PSK, start MCP.
      # App pairing mode (optional): the plugin control center UI handles
      # pairing with the EDAMAME desktop app -- not tested in CI.

      - name: Install edamame_posture (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Installing edamame_posture ---"
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/edamametechnologies/edamame_posture_cli/main/install.sh \
            | sudo sh -s -- --force-binary
          echo "--- edamame_posture installed ---"
          edamame_posture --version || true

      - name: Install edamame_posture (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "--- Installing edamame_posture ---"
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/edamametechnologies/edamame_posture_cli/main/install.sh \
            | sh -s -- --force-binary
          echo "--- edamame_posture installed ---"
          edamame_posture.exe --version || "$HOME/edamame_posture.exe" --version || true

      - name: Generate PSK
        shell: bash
        run: |
          PSK=$(edamame_posture mcp-generate-psk 2>/dev/null | head -n1 || \
                "$HOME/edamame_posture" mcp-generate-psk 2>/dev/null | head -n1 || \
                "$HOME/edamame_posture.exe" mcp-generate-psk 2>/dev/null | head -n1)
          if [ -z "$PSK" ] || [ ${#PSK} -lt 32 ]; then
            echo "FAIL: could not generate PSK (got: '$PSK')"
            exit 1
          fi
          echo "EDAMAME_PSK=$PSK" >> "$GITHUB_ENV"
          echo "PSK generated (${#PSK} chars)"

      - name: Start daemon + MCP server (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Starting daemon (disconnected) ---"
          sudo edamame_posture background-start-disconnected
          sleep 5
          echo "--- Starting MCP server ---"
          sudo edamame_posture mcp-start 3000 "$EDAMAME_PSK"
          echo "MCP server started on port 3000"

      - name: Start daemon + MCP server (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "--- Starting daemon (disconnected) ---"
          CMD=$(command -v edamame_posture.exe 2>/dev/null || echo "$HOME/edamame_posture.exe")
          "$CMD" background-start-disconnected
          sleep 8
          echo "--- Starting MCP server ---"
          "$CMD" mcp-start 3000 "$EDAMAME_PSK"
          echo "MCP server started on port 3000"

      - name: Verify MCP server responds
        shell: bash
        run: |
          MCP_URL="http://127.0.0.1:3000/mcp"
          MCP_HDR=(-H "Content-Type: application/json" -H "Accept: application/json, text/event-stream" -H "Authorization: Bearer $EDAMAME_PSK")

          echo "--- initialize ---"
          INIT=$(curl -s -X POST "$MCP_URL" "${MCP_HDR[@]}" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci-test","version":"1.0"}}}')
          echo "$INIT" | head -c 500
          echo ""
          SESSION=$(echo "$INIT" | grep -o '"sessionId":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -n "$SESSION" ]; then
            MCP_HDR+=(-H "Mcp-Session-Id: $SESSION")
            echo "Session: $SESSION"
          fi

          echo "--- initialized (notification) ---"
          curl -s -X POST "$MCP_URL" "${MCP_HDR[@]}" \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' > /dev/null 2>&1 || true

          echo "--- tools/list ---"
          TOOLS=$(curl -s -X POST "$MCP_URL" "${MCP_HDR[@]}" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "$TOOLS" | head -c 500
          echo ""
          if echo "$TOOLS" | grep -q '"tools"'; then
            echo "tools/list OK"
          else
            echo "FAIL: tools/list did not return tools"; exit 1
          fi

          echo "--- tools/call get_score ---"
          SCORE=$(curl -s -X POST "$MCP_URL" "${MCP_HDR[@]}" \
            -d '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"get_score","arguments":{}}}')
          echo "$SCORE" | head -c 500
          echo ""
          echo "MCP server verified"

      # ── Install plugin ──────────────────────────────────────────

      - name: Run install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Running install.sh ---"
          bash setup/install.sh
          echo "--- Install completed ---"

      - name: Run install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Running install.ps1 ---"
          & "$PWD\setup\install.ps1"
          Write-Host "--- Install completed ---"

      # ── Resolve paths ────────────────────────────────────────────

      - name: Resolve installed paths (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          OPENCLAW_DIR="$HOME/.openclaw"
          echo "OPENCLAW_DIR=$OPENCLAW_DIR" >> "$GITHUB_ENV"

      - name: Resolve installed paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $OpenClawDir = Join-Path $env:USERPROFILE ".openclaw"
          "OPENCLAW_DIR=$OpenClawDir" | Out-File -Append $env:GITHUB_ENV -Encoding utf8

      # ── Verify installed layout ──────────────────────────────────

      - name: Verify installed layout (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Checking installed files ---"
          FAIL=0
          for f in \
            "$OPENCLAW_DIR/extensions/edamame/openclaw.plugin.json" \
            "$OPENCLAW_DIR/extensions/edamame/index.ts" \
            "$OPENCLAW_DIR/skills/edamame-extrapolator/SKILL.md" \
            "$OPENCLAW_DIR/skills/edamame-posture/SKILL.md" \
            "$OPENCLAW_DIR/edamame-openclaw/package.json"; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "  FAIL: $f not found"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1
          echo "--- Layout verified ---"

      - name: Verify installed layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Checking installed files ---"
          $fail = $false
          $files = @(
            "$env:OPENCLAW_DIR\extensions\edamame\openclaw.plugin.json",
            "$env:OPENCLAW_DIR\extensions\edamame\index.ts",
            "$env:OPENCLAW_DIR\skills\edamame-extrapolator\SKILL.md",
            "$env:OPENCLAW_DIR\skills\edamame-posture\SKILL.md",
            "$env:OPENCLAW_DIR\edamame-openclaw\package.json"
          )
          foreach ($f in $files) {
            if (Test-Path $f) { Write-Host "  OK: $f" }
            else { Write-Host "  FAIL: $f not found"; $fail = $true }
          }
          if ($fail) { exit 1 }
          Write-Host "--- Layout verified ---"

      # ── Verify package.json version ──────────────────────────────

      - name: Verify package.json version
        shell: bash
        run: |
          python3 -c "
          import json, os, sys
          pkg_path = os.path.join(os.environ['OPENCLAW_DIR'], 'edamame-openclaw', 'package.json')
          pkg = json.load(open(pkg_path))
          v = pkg.get('version', '')
          if not v:
              print('FAIL: no version in package.json')
              sys.exit(1)
          print(f'Installed version: {v}')
          "

      # ── Verify plugin manifest fields ────────────────────────────

      - name: Verify plugin manifest
        shell: bash
        run: |
          python3 -c "
          import json, os, sys
          manifest_path = os.path.join(os.environ['OPENCLAW_DIR'], 'extensions', 'edamame', 'openclaw.plugin.json')
          m = json.load(open(manifest_path))
          for key in ['id', 'name', 'version']:
              if not m.get(key):
                  print(f'FAIL: missing {key} in plugin manifest')
                  sys.exit(1)
              print(f'  {key}: {m[key]}')
          print('Plugin manifest valid')
          "

      # ── Verify state directory ───────────────────────────────────

      - name: Verify state directory exists
        shell: bash
        run: |
          python3 -c "
          import os, sys
          state = os.path.join(os.environ['OPENCLAW_DIR'], 'edamame-openclaw', 'state')
          if os.path.isdir(state):
              print(f'  OK: state dir exists ({state})')
          else:
              print(f'  FAIL: state dir missing ({state})')
              sys.exit(1)
          "

      # ── Verify MCP reachability from plugin dir ─────────────────

      - name: Verify MCP tools list via curl (second session)
        shell: bash
        run: |
          MCP_URL="http://127.0.0.1:3000/mcp"
          MCP_HDR=(-H "Content-Type: application/json" -H "Accept: application/json, text/event-stream" -H "Authorization: Bearer $EDAMAME_PSK")

          INIT=$(curl -s -X POST "$MCP_URL" "${MCP_HDR[@]}" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci-openclaw","version":"1.0"}}}')
          SESSION=$(echo "$INIT" | grep -o '"sessionId":"[^"]*"' | head -1 | cut -d'"' -f4)
          [ -n "$SESSION" ] && MCP_HDR+=(-H "Mcp-Session-Id: $SESSION")

          curl -s -X POST "$MCP_URL" "${MCP_HDR[@]}" \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' > /dev/null 2>&1 || true

          echo "--- Verifying MCP tools/list ---"
          RESPONSE=$(curl -s -X POST "$MCP_URL" "${MCP_HDR[@]}" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "$RESPONSE" | head -c 500
          echo ""
          echo "--- MCP tools verified ---"

      # ── Stop MCP server ─────────────────────────────────────────

      - name: Stop daemon (Unix)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          sudo edamame_posture stop 2>/dev/null || true
          echo "Daemon stopped"

      - name: Stop daemon (Windows)
        if: always() && runner.os == 'Windows'
        shell: bash
        run: |
          CMD=$(command -v edamame_posture.exe 2>/dev/null || echo "$HOME/edamame_posture.exe")
          "$CMD" stop 2>/dev/null || true
          echo "Daemon stopped"

      # ── Uninstall ────────────────────────────────────────────────

      - name: Uninstall (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Uninstalling ---"
          rm -rf "$OPENCLAW_DIR/extensions/edamame"
          rm -rf "$OPENCLAW_DIR/skills/edamame-extrapolator"
          rm -rf "$OPENCLAW_DIR/skills/edamame-posture"
          rm -rf "$OPENCLAW_DIR/edamame-openclaw"
          echo "--- Uninstall completed ---"

      - name: Uninstall (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Uninstalling ---"
          $dirs = @(
            "$env:OPENCLAW_DIR\extensions\edamame",
            "$env:OPENCLAW_DIR\skills\edamame-extrapolator",
            "$env:OPENCLAW_DIR\skills\edamame-posture",
            "$env:OPENCLAW_DIR\edamame-openclaw"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) { Remove-Item -Recurse -Force $d }
          }
          Write-Host "--- Uninstall completed ---"

      # ── Verify uninstall ─────────────────────────────────────────

      - name: Verify uninstall
        shell: bash
        run: |
          echo "--- Verifying uninstall ---"
          python3 -c "
          import os, sys
          ocdir = os.environ['OPENCLAW_DIR']
          dirs = [
              os.path.join(ocdir, 'extensions', 'edamame'),
              os.path.join(ocdir, 'skills', 'edamame-extrapolator'),
              os.path.join(ocdir, 'skills', 'edamame-posture'),
              os.path.join(ocdir, 'edamame-openclaw'),
          ]
          fail = False
          for d in dirs:
              if os.path.isdir(d):
                  print(f'  FAIL: {d} still exists')
                  fail = True
              else:
                  print(f'  OK: {d} removed')
          if fail:
              sys.exit(1)
          "
          echo "--- Uninstall verified ---"

      # ── Slack alert ──────────────────────────────────────────────

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: "C072J0U9TH7"
          slack-message: |
            *edamame_openclaw Provisioning CI Failed*
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            OS: ${{ matrix.os }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true
