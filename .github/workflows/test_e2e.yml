on:
  push:
    branches: [ dev, main ]
    paths:
      - 'extensions/**'
      - 'scripts/**'
      - 'setup/**'
      - 'skill/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test_e2e.yml'
  pull_request:
    paths:
      - 'extensions/**'
      - 'scripts/**'
      - 'setup/**'
      - 'skill/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test_e2e.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

name: E2E tests

permissions: read-all

jobs:
  provision:
    name: Provision (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Install edamame_posture (real MCP server) ───────────────
      # PSK pairing mode: install posture CLI, generate PSK, start MCP.
      # App pairing mode (optional): the plugin control center UI handles
      # pairing with the EDAMAME desktop app -- not tested in CI.

      - name: Install edamame_posture (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "--- Installing edamame_posture ---"
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/edamametechnologies/edamame_posture_cli/main/install.sh \
            | sudo -E sh -s -- --force-binary
          EP=$(command -v edamame_posture 2>/dev/null || echo /usr/local/bin/edamame_posture)
          echo "EDAMAME_POSTURE=$EP" >> "$GITHUB_ENV"
          "$EP" --version

      - name: Install edamame_posture (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "--- Installing edamame_posture ---"
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/edamametechnologies/edamame_posture_cli/main/install.sh \
            | sh -s -- --force-binary
          EP=$(command -v edamame_posture.exe 2>/dev/null || command -v edamame_posture 2>/dev/null || echo "$HOME/edamame_posture.exe")
          echo "EDAMAME_POSTURE=$EP" >> "$GITHUB_ENV"
          "$EP" --version

      - name: Generate PSK
        shell: bash
        run: |
          PSK=$("$EDAMAME_POSTURE" mcp-generate-psk 2>&1 | head -n1) || true
          if [ -z "$PSK" ] || [ ${#PSK} -lt 32 ]; then
            echo "FAIL: could not generate PSK (got: '$PSK')"
            echo "Trying with sudo..."
            PSK=$(sudo "$EDAMAME_POSTURE" mcp-generate-psk 2>&1 | head -n1) || true
          fi
          if [ -z "$PSK" ] || [ ${#PSK} -lt 32 ]; then
            echo "FAIL: could not generate PSK even with sudo (got: '$PSK')"
            exit 1
          fi
          echo "EDAMAME_PSK=$PSK" >> "$GITHUB_ENV"
          echo "PSK generated (${#PSK} chars)"

      - name: Start daemon + MCP server (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
        run: |
          echo "--- Starting daemon (disconnected + capture) ---"
          sudo -E "$EDAMAME_POSTURE" background-start-disconnected --packet-capture
          sleep 5
          echo "--- Starting MCP server ---"
          sudo "$EDAMAME_POSTURE" mcp-start 3000 "$EDAMAME_PSK"
          echo "MCP server started on port 3000"

      - name: Start daemon + MCP server (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
        run: |
          echo "--- Starting daemon (disconnected + capture) ---"
          "$EDAMAME_POSTURE" background-start-disconnected --packet-capture
          sleep 8
          echo "--- Starting MCP server ---"
          MSYS_NO_PATHCONV=1 "$EDAMAME_POSTURE" mcp-start 3000 "$EDAMAME_PSK"
          echo "MCP server started on port 3000"

      - name: Verify MCP server responds
        shell: bash
        run: |
          MCP_URL="http://127.0.0.1:3000/mcp"
          HDRS="/tmp/mcp_headers.txt"

          mcp_curl() {
            local SESSION_ARGS=()
            [ -n "${MCP_SESSION:-}" ] && SESSION_ARGS=(-H "Mcp-Session-Id: $MCP_SESSION")
            curl -s -X POST "$MCP_URL" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -H "Authorization: Bearer $EDAMAME_PSK" \
              "${SESSION_ARGS[@]}" "$@"
          }

          echo "--- initialize ---"
          INIT_RAW=$(curl -s -D "$HDRS" -X POST "$MCP_URL" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -H "Authorization: Bearer $EDAMAME_PSK" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci-test","version":"1.0"}}}')
          INIT=$(echo "$INIT_RAW" | sed 's/^data: //')
          echo "$INIT" | head -c 500
          echo ""

          MCP_SESSION=$(grep -i 'mcp-session-id' "$HDRS" 2>/dev/null | tr -d '\r' | awk '{print $2}' | head -1 || true)
          echo "Session: ${MCP_SESSION:-<none>}"

          echo "--- initialized (notification) ---"
          mcp_curl -d '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' > /dev/null 2>&1 || true

          echo "--- tools/list ---"
          TOOLS_RAW=$(mcp_curl -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          TOOLS=$(echo "$TOOLS_RAW" | sed 's/^data: //')
          echo "$TOOLS" | head -c 500
          echo ""
          if echo "$TOOLS" | grep -q '"tools"'; then
            echo "tools/list OK"
          else
            echo "FAIL: tools/list did not return tools"; exit 1
          fi

          echo "--- tools/call get_score ---"
          SCORE_RAW=$(mcp_curl -d '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"get_score","arguments":{}}}')
          SCORE=$(echo "$SCORE_RAW" | sed 's/^data: //')
          echo "$SCORE" | head -c 500
          echo ""
          echo "MCP server verified"

      # ── Install plugin ──────────────────────────────────────────

      - name: Run install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Running install.sh ---"
          bash setup/install.sh
          echo "--- Install completed ---"

      - name: Run install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Running install.ps1 ---"
          & "$PWD\setup\install.ps1"
          Write-Host "--- Install completed ---"

      # ── Resolve paths ────────────────────────────────────────────

      - name: Resolve installed paths (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          OPENCLAW_DIR="$HOME/.openclaw"
          echo "OPENCLAW_DIR=$OPENCLAW_DIR" >> "$GITHUB_ENV"

      - name: Resolve installed paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $OpenClawDir = Join-Path $env:USERPROFILE ".openclaw"
          "OPENCLAW_DIR=$OpenClawDir" | Out-File -Append $env:GITHUB_ENV -Encoding utf8

      # ── Verify installed layout ──────────────────────────────────

      - name: Verify installed layout (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Checking installed files ---"
          FAIL=0
          for f in \
            "$OPENCLAW_DIR/extensions/edamame/openclaw.plugin.json" \
            "$OPENCLAW_DIR/extensions/edamame/index.ts" \
            "$OPENCLAW_DIR/skills/edamame-extrapolator/SKILL.md" \
            "$OPENCLAW_DIR/skills/edamame-posture/SKILL.md" \
            "$OPENCLAW_DIR/edamame-openclaw/package.json"; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "  FAIL: $f not found"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1
          echo "--- Layout verified ---"

      - name: Verify installed layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Checking installed files ---"
          $fail = $false
          $files = @(
            "$env:OPENCLAW_DIR\extensions\edamame\openclaw.plugin.json",
            "$env:OPENCLAW_DIR\extensions\edamame\index.ts",
            "$env:OPENCLAW_DIR\skills\edamame-extrapolator\SKILL.md",
            "$env:OPENCLAW_DIR\skills\edamame-posture\SKILL.md",
            "$env:OPENCLAW_DIR\edamame-openclaw\package.json"
          )
          foreach ($f in $files) {
            if (Test-Path $f) { Write-Host "  OK: $f" }
            else { Write-Host "  FAIL: $f not found"; $fail = $true }
          }
          if ($fail) { exit 1 }
          Write-Host "--- Layout verified ---"

      # ── Verify package.json version ──────────────────────────────

      - name: Verify package.json version
        shell: bash
        run: |
          python3 -c "
          import json, os, sys
          pkg_path = os.path.join(os.environ['OPENCLAW_DIR'], 'edamame-openclaw', 'package.json')
          pkg = json.load(open(pkg_path))
          v = pkg.get('version', '')
          if not v:
              print('FAIL: no version in package.json')
              sys.exit(1)
          print(f'Installed version: {v}')
          "

      # ── Verify plugin manifest fields ────────────────────────────

      - name: Verify plugin manifest
        shell: bash
        run: |
          python3 -c "
          import json, os, sys
          manifest_path = os.path.join(os.environ['OPENCLAW_DIR'], 'extensions', 'edamame', 'openclaw.plugin.json')
          m = json.load(open(manifest_path))
          for key in ['id', 'name', 'version']:
              if not m.get(key):
                  print(f'FAIL: missing {key} in plugin manifest')
                  sys.exit(1)
              print(f'  {key}: {m[key]}')
          print('Plugin manifest valid')
          "

      # ── Verify state directory ───────────────────────────────────

      - name: Verify state directory exists
        shell: bash
        run: |
          python3 -c "
          import os, sys
          state = os.path.join(os.environ['OPENCLAW_DIR'], 'edamame-openclaw', 'state')
          if os.path.isdir(state):
              print(f'  OK: state dir exists ({state})')
          else:
              print(f'  FAIL: state dir missing ({state})')
              sys.exit(1)
          "

      # ── Healthcheck via real MCP ────────────────────────────────

      - name: Run healthcheck against real MCP
        shell: bash
        env:
          EDAMAME_MCP_ENDPOINT: http://127.0.0.1:3000/mcp
        run: |
          echo "--- Running healthcheck ---"
          node "$OPENCLAW_DIR/edamame-openclaw/service/healthcheck_cli.mjs" --json || true
          echo "--- Healthcheck completed ---"

      # ── Verify MCP reachability from plugin dir ─────────────────

      - name: Verify MCP tools list via curl (second session)
        shell: bash
        run: |
          MCP_URL="http://127.0.0.1:3000/mcp"
          HDRS2="/tmp/mcp_headers2.txt"

          mcp_curl2() {
            local SESSION_ARGS=()
            [ -n "${MCP_SESSION2:-}" ] && SESSION_ARGS=(-H "Mcp-Session-Id: $MCP_SESSION2")
            curl -s -X POST "$MCP_URL" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -H "Authorization: Bearer $EDAMAME_PSK" \
              "${SESSION_ARGS[@]}" "$@"
          }

          INIT_RAW=$(curl -s -D "$HDRS2" -X POST "$MCP_URL" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -H "Authorization: Bearer $EDAMAME_PSK" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci-openclaw","version":"1.0"}}}')
          MCP_SESSION2=$(grep -i 'mcp-session-id' "$HDRS2" 2>/dev/null | tr -d '\r' | awk '{print $2}' | head -1 || true)

          mcp_curl2 -d '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' > /dev/null 2>&1 || true

          echo "--- Verifying MCP tools/list ---"
          RESPONSE_RAW=$(mcp_curl2 -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "$RESPONSE_RAW" | sed 's/^data: //' | head -c 500
          echo ""
          echo "--- MCP tools verified ---"

      # ── Intent E2E (full LLM-backed) ───────────────────────────

      - name: Install edamame_cli
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl --proto '=https' --tlsv1.2 -sSf \
              https://raw.githubusercontent.com/edamametechnologies/edamame_cli/main/install.sh \
              | sh -s -- --force-binary
            EC=$(command -v edamame_cli.exe 2>/dev/null || command -v edamame_cli 2>/dev/null || echo "$HOME/edamame_cli.exe")
          else
            curl --proto '=https' --tlsv1.2 -sSf \
              https://raw.githubusercontent.com/edamametechnologies/edamame_cli/main/install.sh \
              | sudo -E sh -s -- --force-binary
            EC=$(command -v edamame_cli 2>/dev/null || echo /usr/local/bin/edamame_cli)
          fi
          echo "EDAMAME_CLI=$EC" >> "$GITHUB_ENV"
          "$EC" --version

      # WORKAROUND: The plan endpoint auto-registers the device_id in the
      # backend. Without this call, agentic_analysis fails with
      # NonExistentDevice on ephemeral macOS runners. Fixed in edamame_core
      # (DEVICE_PLAN_REGISTERED gate) but not yet released; remove once
      # edamame_posture >= 1.1.3 is published.
      - name: Pre-register device via plan endpoint
        shell: bash
        run: |
          "$EDAMAME_CLI" rpc agentic_get_subscription_status || echo "WARN: plan pre-registration failed (non-fatal)"

      - name: Run intent E2E
        timeout-minutes: 10
        shell: bash
        env:
          E2E_POLL_ATTEMPTS: "48"
          E2E_POLL_INTERVAL_SECS: "5"
          E2E_SKIP_PROVISION_STRICT: "1"
          E2E_SKIP_REPO_VERSION_CHECK: "1"
          EDAMAME_CLI: ${{ env.EDAMAME_CLI }}
          EDAMAME_MCP_PSK: ${{ env.EDAMAME_PSK }}
        run: |
          bash tests/e2e_inject_intent.sh

      # ── CVE / Detection E2E ──────────────────────────────────────
      # Downloads trigger scripts from agent_security (public) and runs
      # a subset of CVE scenarios against the live posture daemon.
      # Verifies that edamame_posture detects the simulated attacks by
      # checking for sessions to the trigger destinations.

      - name: Download CVE trigger scripts
        shell: bash
        run: |
          TRIGGERS_DIR="${RUNNER_TEMP:-/tmp}/cve_triggers"
          mkdir -p "$TRIGGERS_DIR"
          BASE_URL="https://raw.githubusercontent.com/edamametechnologies/agent_security/main/tests/e2e/triggers"
          for f in _common.py _native_udp_probe.py _edamame_cli.py cleanup.py \
                   trigger_cve_token_exfil.py trigger_cve_sandbox_escape.py \
                   trigger_memory_poisoning.py \
                   trigger_credential_sprawl.py trigger_tool_poisoning_effects.py \
                   trigger_supply_chain_exfil.py \
                   trigger_divergence.py trigger_goal_drift.py \
                   trigger_blacklist_comm.py; do
            curl -sfL "$BASE_URL/$f" -o "$TRIGGERS_DIR/$f" || echo "WARN: failed to download $f"
          done
          echo "CVE_TRIGGERS_DIR=$TRIGGERS_DIR" >> "$GITHUB_ENV"
          ls -la "$TRIGGERS_DIR"

      - name: Run CVE detection scenarios
        timeout-minutes: 15
        shell: bash
        env:
          EDAMAME_CLI: ${{ env.EDAMAME_CLI }}
          EDAMAME_AGENT_TYPE: openclaw
        run: |
          TRIGGERS_DIR="$CVE_TRIGGERS_DIR"
          CLI="$EDAMAME_CLI"
          AGENT_TYPE="openclaw"

          TRIGGER_DURATION=60
          POST_WAIT=30
          COOLDOWN=5
          POLL_ATTEMPTS=6
          POLL_INTERVAL=10

          SCENARIOS_PASS=0
          SCENARIOS_FAIL=0
          SCENARIOS_SKIP=0

          check_sessions() {
            local target_desc="$1"
            "$CLI" rpc get_current_sessions 2>/dev/null | python3 -c "
          import json, sys
          raw = sys.stdin.read().strip()
          if raw.startswith('Result: '):
              raw = raw[len('Result: '):]
          if not raw or raw == 'null':
              print('  total_sessions=0')
              sys.exit(1)
          try:
              data = json.loads(raw)
              if isinstance(data, str):
                  data = json.loads(data)
          except Exception as e:
              print(f'  sessions: parse error: {e}')
              print(f'  raw_prefix: {raw[:200]}')
              sys.exit(1)
          sessions = data if isinstance(data, list) else data.get('sessions', [])
          print(f'  total_sessions={len(sessions)}')
          target = sys.argv[1]
          matched = [s.get('dst_addr','') + ':' + str(s.get('dst_port','')) for s in sessions if target in json.dumps(s)]
          if matched:
              print(f'  matched: {matched[:5]}')
              sys.exit(0)
          dst_sample = [s.get('dst_addr','') + ':' + str(s.get('dst_port','')) for s in sessions[:10]]
          if dst_sample:
              print(f'  sample_destinations: {dst_sample}')
          sys.exit(1)
          " "$target_desc" 2>&1
            return $?
          }

          run_scenario() {
            local name="$1"
            local script="trigger_${name}.py"
            local target_desc="$2"

            if [ ! -f "$TRIGGERS_DIR/$script" ]; then
              echo "SKIP: $script not found"
              SCENARIOS_SKIP=$((SCENARIOS_SKIP + 1))
              return 0
            fi

            echo ""
            echo "=========================================="
            echo "SCENARIO: $name"
            echo "=========================================="

            echo "--- Starting trigger (${TRIGGER_DURATION}s) ---"
            python3 "$TRIGGERS_DIR/$script" \
              --agent-type "$AGENT_TYPE" \
              --duration "$TRIGGER_DURATION" &
            local TPID=$!
            echo "Trigger PID: $TPID"

            echo "--- Waiting ${POST_WAIT}s for session ingestion ---"
            sleep "$POST_WAIT"

            echo "--- Checking sessions via edamame_cli ---"
            local FOUND=0
            for ((i = 1; i <= POLL_ATTEMPTS; i++)); do
              echo "  poll $i/$POLL_ATTEMPTS"
              if check_sessions "$target_desc"; then
                FOUND=1
                echo "  Session detected for $name"
                break
              fi
              sleep "$POLL_INTERVAL"
            done

            echo "--- Stopping trigger ---"
            kill "$TPID" 2>/dev/null || true
            wait "$TPID" 2>/dev/null || true

            echo "--- Running cleanup ---"
            python3 "$TRIGGERS_DIR/cleanup.py" --agent-type "$AGENT_TYPE" 2>/dev/null || true

            if [ "$FOUND" -eq 1 ]; then
              echo "PASS: $name - session detected"
              SCENARIOS_PASS=$((SCENARIOS_PASS + 1))
            else
              echo "WARN: $name - no session detected (non-fatal in CI)"
              SCENARIOS_FAIL=$((SCENARIOS_FAIL + 1))
            fi

            sleep "$COOLDOWN"
          }

          echo "=== CVE Detection E2E Suite ==="
          echo "Agent type: $AGENT_TYPE"
          echo "Trigger duration: ${TRIGGER_DURATION}s"
          echo ""

          echo "--- Starting packet capture ---"
          "$CLI" rpc start_capture 2>&1 || echo "WARN: start_capture failed"
          sleep 10
          echo "--- Capture diagnostics ---"
          "$CLI" rpc get_capture_status 2>/dev/null | head -c 500 || echo "get_capture_status unavailable"
          echo ""

          run_scenario "cve_token_exfil" "portquiz"
          run_scenario "cve_sandbox_escape" "1.0.0.1"
          run_scenario "memory_poisoning" "portquiz"
          run_scenario "credential_sprawl" "portquiz"
          run_scenario "tool_poisoning_effects" "portquiz"
          run_scenario "supply_chain_exfil" "portquiz"
          run_scenario "blacklist_comm" "5.188.11"
          run_scenario "divergence" "1.0.0.1"
          run_scenario "goal_drift" "1.1.1.1"

          echo ""
          echo "=========================================="
          echo "CVE Suite Summary"
          echo "  PASS: $SCENARIOS_PASS"
          echo "  WARN: $SCENARIOS_FAIL"
          echo "  SKIP: $SCENARIOS_SKIP"
          echo "=========================================="

          python3 "$TRIGGERS_DIR/cleanup.py" --agent-type "$AGENT_TYPE" 2>/dev/null || true

      # ── Stop MCP server ─────────────────────────────────────────

      - name: Stop daemon (Unix)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          sudo "$EDAMAME_POSTURE" stop 2>/dev/null || true
          echo "Daemon stopped"

      - name: Stop daemon (Windows)
        if: always() && runner.os == 'Windows'
        shell: bash
        run: |
          "$EDAMAME_POSTURE" stop 2>/dev/null || true
          echo "Daemon stopped"

      # ── Uninstall ────────────────────────────────────────────────

      - name: Uninstall (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Uninstalling ---"
          rm -rf "$OPENCLAW_DIR/extensions/edamame"
          rm -rf "$OPENCLAW_DIR/skills/edamame-extrapolator"
          rm -rf "$OPENCLAW_DIR/skills/edamame-posture"
          rm -rf "$OPENCLAW_DIR/edamame-openclaw"
          echo "--- Uninstall completed ---"

      - name: Uninstall (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Uninstalling ---"
          $dirs = @(
            "$env:OPENCLAW_DIR\extensions\edamame",
            "$env:OPENCLAW_DIR\skills\edamame-extrapolator",
            "$env:OPENCLAW_DIR\skills\edamame-posture",
            "$env:OPENCLAW_DIR\edamame-openclaw"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) { Remove-Item -Recurse -Force $d }
          }
          Write-Host "--- Uninstall completed ---"

      # ── Verify uninstall ─────────────────────────────────────────

      - name: Verify uninstall
        shell: bash
        run: |
          echo "--- Verifying uninstall ---"
          python3 -c "
          import os, sys
          ocdir = os.environ['OPENCLAW_DIR']
          dirs = [
              os.path.join(ocdir, 'extensions', 'edamame'),
              os.path.join(ocdir, 'skills', 'edamame-extrapolator'),
              os.path.join(ocdir, 'skills', 'edamame-posture'),
              os.path.join(ocdir, 'edamame-openclaw'),
          ]
          fail = False
          for d in dirs:
              if os.path.isdir(d):
                  print(f'  FAIL: {d} still exists')
                  fail = True
              else:
                  print(f'  OK: {d} removed')
          if fail:
              sys.exit(1)
          "
          echo "--- Uninstall verified ---"

      # ── Slack alert ──────────────────────────────────────────────

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: "C072J0U9TH7"
          slack-message: |
            *edamame_openclaw Provisioning CI Failed*
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            OS: ${{ matrix.os }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true
