on:
  push:
    branches: [ dev, main ]
    paths:
      - 'extensions/**'
      - 'scripts/**'
      - 'setup/**'
      - 'skill/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'extensions/**'
      - 'scripts/**'
      - 'setup/**'
      - 'skill/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

name: Plugin install and unit tests

permissions: read-all

jobs:
  test:
    name: Install and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:

      - name: Setup EDAMAME Posture
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}
          checkout: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenClaw plugin manifest
        run: |
          echo "--- Validating OpenClaw plugin manifest ---"
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('extensions/edamame/openclaw.plugin.json')) { console.error('FAIL: openclaw.plugin.json not found'); process.exit(1); }
            const m = require('./extensions/edamame/openclaw.plugin.json');
            console.log('Plugin id:', m.id);
            console.log('Plugin name:', m.name);
            if (!m.id || !m.name) { console.error('FAIL: missing id or name'); process.exit(1); }
          "
          echo "--- OpenClaw plugin manifest valid ---"

      - name: Verify plugin structure
        run: |
          echo "--- Checking plugin file structure ---"
          node -e "
            const fs = require('fs');
            const files = [
              'extensions/edamame/index.ts',
              'skill/edamame-extrapolator/SKILL.md',
              'skill/edamame-posture/SKILL.md',
              'setup/install.sh',
              'setup/install.ps1',
              'setup/provision.sh',
              'setup/build_posture.sh',
              'service/healthcheck_cli.mjs',
            ];
            let ok = true;
            for (const f of files) {
              if (!fs.existsSync(f)) { console.error('FAIL: ' + f + ' not found'); ok = false; }
              else { console.log('  OK: ' + f); }
            }
            if (!ok) process.exit(1);
          "
          echo "--- Plugin structure valid ---"

      - name: Run manual install (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "--- Running manual install ---"
          bash setup/install.sh
          echo "--- Manual install completed ---"

      - name: Run manual install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "--- Running manual install ---"
          .\setup\install.ps1
          echo "--- Manual install completed ---"

      - name: Run unit tests
        run: npm test

      - name: Verify MCP plugin TypeScript exports
        run: |
          echo "--- Checking MCP plugin exports ---"
          node --import tsx -e "
            const m = require('./extensions/edamame/index.ts');
            const exports = Object.keys(m).filter(k => typeof m[k] === 'function');
            console.log('Exported functions:', exports.length);
            for (const fn of ['_filterGetSessionsPayload', '_trimScorePayload', '_buildSessionPayload', '_buildRawPayload']) {
              if (!exports.includes(fn)) { console.error('FAIL: missing export ' + fn); process.exit(1); }
              console.log('  OK: ' + fn);
            }
          "
          echo "--- MCP plugin exports valid ---"

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: "C072J0U9TH7"
          slack-message: |
            *edamame_openclaw CI Failed (${{ matrix.os }})*
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true
