# Lima VM template for OpenClaw + EDAMAME Posture (example)
#
# Uses alternate host ports so it can coexist with other VMs or the macOS app:
#   - EDAMAME gRPC:       host 40153 -> guest 40152
#   - OpenClaw Dashboard: host 18790 -> guest 18789
#   - EDAMAME MCP:        host 3002  -> guest 3000
#
# Usage:
#   VM_NAME=edamame-openclaw-example LIMA_TEMPLATE=setup/lima-example-openclaw.yaml limactl create --name=edamame-openclaw-example setup/lima-example-openclaw.yaml
#   limactl start edamame-openclaw-example
#   limactl shell edamame-openclaw-example -- bash /path/to/provision.sh
#
# Provision env vars (see provision.sh header): EDAMAME_LLM_API_KEY,
# EDAMAME_TELEGRAM_BOT_TOKEN, EDAMAME_TELEGRAM_CHAT_ID, etc.

images:
  - location: "~/.lima/_images/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "~/.lima/_images/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/releases/noble/release-20260225/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/noble/release-20260225/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 4
memory: "4GiB"
disk: "20GiB"

mounts:
  - location: "~"
    writable: false
  - location: "/tmp/lima"
    writable: true

portForwards:
  - guestPort: 40152
    hostPort: 40153
    proto: tcp
  - guestPort: 18789
    hostPort: 18790
    proto: tcp
  - guestPort: 3000
    hostPort: 3002
    proto: tcp

containerd:
  system: false
  user: false

provision:
  - mode: dependency
    skipDefaultDependencyResolution: true
    script: |
      #!/bin/bash
      set -eux -o pipefail
      echo "Using project-managed dependency provisioning"

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      echo "System cloud-init complete (runtime provisioning deferred to setup/provision.sh)"

  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      echo "User cloud-init complete (runtime provisioning deferred to setup/provision.sh)"
