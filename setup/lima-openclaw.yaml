# Lima VM template for OpenClaw + EDAMAME Posture Security PoC
#
# Creates an Ubuntu 24.04 VM with:
#   - EDAMAME Posture (endpoint security daemon + MCP server)
#   - OpenClaw (self-improving AI agent runtime)
#
# eBPF requirements (satisfied by Ubuntu 24.04, kernel >= 6.8):
#   - Kernel with CONFIG_BPF, CONFIG_KPROBES, CONFIG_DEBUG_INFO_BTF
#   - The daemon attaches kprobes to tcp_set_state for L7 process attribution
#   - Runs as root (CAP_SYS_ADMIN) — no perf_event_paranoid restrictions
#
# Usage:
#   limactl create --name=openclaw-security setup/lima-openclaw.yaml
#   limactl start openclaw-security

# Prefer a local cached copy so VM recreation never triggers a download.
# To refresh: download a new image and place it at the local path below.
# Remote URLs are kept as fallback for first-time setup on a new machine.
images:
  - location: "~/.lima/_images/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "~/.lima/_images/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/releases/noble/release-20260225/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/noble/release-20260225/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 8
memory: "16GiB"
disk: "20GiB"

# Mount host filesystem read-only (for secrets and repo access)
mounts:
  - location: "~"
    writable: false
  - location: "/tmp/lima"
    writable: true

# Forward ports to host.
# Port 40152 (EDAMAME_CORE_SERVER gRPC) MUST be redirected to a different host
# port.  Lima auto-forwards any guest listener to the same host port by default;
# if 40152 is forwarded as-is it blocks the macOS EDAMAME app from binding its
# own gRPC server on the same address.
portForwards:
  - guestPort: 40152
    hostPort: 40154
    proto: tcp
  - guestPort: 18789
    hostPort: 18789
    proto: tcp
  - guestPort: 3000
    hostPort: 3001
    proto: tcp

# Container runtime is not needed for OpenClaw + EDAMAME tests.
containerd:
  system: false
  user: false

provision:
  # Skip Lima's default dependency resolver to avoid long first-boot apt stalls.
  # This project provisions all required packages explicitly in the system script.
  - mode: dependency
    skipDefaultDependencyResolution: true
    script: |
      #!/bin/bash
      set -eux -o pipefail
      echo "Using project-managed dependency provisioning"

  # --- System-level: keep first boot lightweight ---
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      echo "System cloud-init complete (runtime provisioning deferred to setup/provision.sh)"

  # --- User-level: no-op during first boot ---
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      echo "User cloud-init complete (runtime provisioning deferred to setup/provision.sh)"
